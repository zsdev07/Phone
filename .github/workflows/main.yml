name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # lets you trigger it manually from GitHub UI

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 (required by Gradle 8.x) ────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter ──────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'   # pin a stable version
          channel: stable
          cache: true

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 5. Analyze (catch obvious errors before building) ──────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true   # don't fail the build on warnings

      # ── 6. Build DEBUG APK ─────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose

      # ── 7. Build RELEASE APK (signed with debug key for now) ──────────
      - name: Build release APK
        run: flutter build apk --release --verbose

      # ── 8. Upload debug APK as artifact ───────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 9. Upload release APK as artifact ─────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
