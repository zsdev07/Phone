name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ─────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Set up Flutter (latest stable, no version pin) ─────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Print versions for debugging ───────────────────────────────
      - name: Print Flutter & Dart version
        run: |
          flutter --version
          dart --version
          java -version

      # ── 5. Install dependencies ────────────────────────────────────────
      - name: flutter pub get
        run: flutter pub get --verbose

      # ── 6. Analyze ────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 7. Build DEBUG APK ─────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug --verbose

      # ── 8. Build RELEASE APK ──────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --verbose

      # ── 9. Upload debug APK ───────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── 10. Upload release APK ────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
