name: phone
description: Phone — Open source, privacy-first dialer for Android.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <3.8.0'
  flutter: '>=3.19.0 <3.32.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Contacts & Call Log
  flutter_contacts: ^1.1.9+2
  call_log: ^4.0.1

  # Permissions
  permission_handler: ^11.3.1

  # URL launcher (fallback dialing)
  url_launcher: ^6.3.0

  # Animations
  flutter_animate: ^4.5.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
