name: phone
description: Phone — Open source, privacy-first dialer for Android.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: any
  flutter_riverpod: any
  flutter_contacts: any
  call_log: any
  permission_handler: any
  url_launcher: any
  flutter_animate: any
  cupertino_icons: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
